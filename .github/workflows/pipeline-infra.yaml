name: Infrastructure Pipeline

on:
  workflow_dispatch:
    inputs:
      confirm_bootstrap:
        description: "Type 'yes' to run bootstrap (S3 + DynamoDB)"
        required: false
        default: "no"
      environment:
        description: "Environment to plan/apply"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qua
          - rec
          - prod
      apply:
        description: "Run terraform apply after plan"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------
  # 1) BOOTSTRAP BACKEND (S3 + DynamoDB)
  # ---------------------------------------------------------
  bootstrap:
    if: ${{ github.event.inputs.confirm_bootstrap == 'yes' }}
    runs-on: ubuntu-latest

    outputs:
      bucket: ${{ steps.bucket.outputs.bucket }}
      lock_table: ${{ steps.lock.outputs.lock_table }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20 (fix EPIPE)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Terraform manually
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip
          unzip terraform_1.5.0_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init (bootstrap)
        working-directory: ./Terraform-infrastr/bootstrap
        run: terraform init

      - name: Terraform Plan (bootstrap)
        working-directory: ./Terraform-infrastr/bootstrap
        run: terraform plan -out=tfplan

      - name: Terraform Apply (bootstrap)
        working-directory: ./Terraform-infrastr/bootstrap
        run: terraform apply -auto-approve tfplan

      - name: Get S3 bucket output
        id: bucket
        working-directory: ./Terraform-infrastr/bootstrap
        run: |
          BUCKET=$(terraform output -raw state_bucket_name | head -n 1 | tr -d '\r')
          printf "bucket=%s\n" "$BUCKET" >> $GITHUB_OUTPUT

      - name: Get DynamoDB table output
        id: lock
        working-directory: ./Terraform-infrastr/bootstrap
        run: |
          LOCK=$(terraform output -raw locks_table_name | head -n 1 | tr -d '\r')
          printf "lock_table=%s\n" "$LOCK" >> $GITHUB_OUTPUT


  # ---------------------------------------------------------
  # 2) TERRAFORM INFRA (multi-env)
  # ---------------------------------------------------------
  terraform:
    runs-on: ubuntu-latest
    needs: [bootstrap]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20 (fix EPIPE)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Terraform manually
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip
          unzip terraform_1.5.0_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      # -----------------------------
      # FIX : fallback dynamique backend
      # -----------------------------
      - name: Set backend values
        run: |
          if [ -n "${{ needs.bootstrap.outputs.bucket }}" ]; then
            echo "TF_BUCKET=${{ needs.bootstrap.outputs.bucket }}" >> $GITHUB_ENV
          else
            echo "TF_BUCKET=${{ secrets.TF_BACKEND_BUCKET }}" >> $GITHUB_ENV
          fi

          if [ -n "${{ needs.bootstrap.outputs.lock_table }}" ]; then
            echo "TF_LOCK=${{ needs.bootstrap.outputs.lock_table }}" >> $GITHUB_ENV
          else
            echo "TF_LOCK=${{ secrets.TF_BACKEND_LOCK_TABLE }}" >> $GITHUB_ENV
          fi

          # IMPORTANT : définir la clé du state
          echo "TF_KEY=terraform-${{ github.event.inputs.environment }}.tfstate" >> $GITHUB_ENV

      - name: Terraform Init (dynamic backend)
        working-directory: Terraform-infrastr
        run: |
          echo "Using backend bucket: $TF_BUCKET"
          echo "Using backend lock table: $TF_LOCK"
          echo "Using backend key: $TF_KEY"

          terraform init \
            -backend-config="bucket=$TF_BUCKET" \
            -backend-config="dynamodb_table=$TF_LOCK" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="key=$TF_KEY"

      - name: Terraform Validate
        working-directory: Terraform-infrastr
        run: terraform validate

      - name: Terraform Plan
        working-directory: Terraform-infrastr
        run: |
          terraform plan \
            -var-file=inventories/${{ github.event.inputs.environment }}/terraform.tfvars \
            -out=tfplan-${{ github.event.inputs.environment }}

      
      - name: Terraform Apply
        if: ${{ github.event.inputs.apply == 'true' }}
        working-directory: Terraform-infrastr
        run: terraform apply -auto-approve tfplan-${{ github.event.inputs.environment }}
