name: Terraform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan/apply"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qua
          - rec
          - prod
      apply:
        description: "Run terraform apply after plan"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, qua, rec, prod]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: Terraform-infrastr
        run: terraform init -input=false -backend-config=inventories/${{ matrix.environment }}/backend.hcl

      - name: Terraform Format Check
        working-directory: Terraform-infrastr
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: Terraform-infrastr
        run: terraform validate

      - name: Terraform Plan
        working-directory: Terraform-infrastr
        run: terraform plan -var-file=inventories/${{ matrix.environment }}/terraform.tfvars -out=tfplan-${{ matrix.environment }} -input=false

      - name: Terraform Apply
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && matrix.environment == github.event.inputs.environment }}
        working-directory: Terraform-infrastr
        run: terraform apply -auto-approve tfplan-${{ matrix.environment }}
