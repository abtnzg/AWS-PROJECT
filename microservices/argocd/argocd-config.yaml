---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Enable self-signed certificates
  url: https://argocd.205474062795.realhandsonlabs.net
  
  # RBAC Configuration
  policy.default: role:readonly
  policy.csv: |
    p, role:devops, applications, *, */*, allow
    p, role:devops, repositories, *, *, allow
    p, role:devops, clusters, *, *, allow
    p, role:devops, accounts, *, *, allow
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, sync, */*, allow
    p, role:readonly, applications, get, */*, allow
    g, admin, role:devops
    g, developers, role:developer
    g, viewers, role:readonly

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  # Server settings
  server.disable.auth: "false"
  server.insecure: "false"
  
  # Repository settings
  repository.credentials: |
    - url: https://github.com/abtnzg
      passwordSecret:
        name: github-credentials
        key: password
      usernameSecret:
        name: github-credentials
        key: username

---
apiVersion: v1
kind: Secret
metadata:
  name: github-credentials
  namespace: argocd
type: Opaque
data:
  username: {{ .Values.github.username | b64enc }}
  password: {{ .Values.github.token | b64enc }}
