{{- if .Values.apiGateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: "{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}"
        imagePullPolicy: {{ .Values.apiGateway.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.apiGateway.port }}
        env:
        - name: PORT
          value: "{{ .Values.apiGateway.port }}"
        - name: USER_SERVICE_URL
          value: "http://user-service:{{ .Values.userService.service.port }}"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:{{ .Values.productService.service.port }}"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:{{ .Values.orderService.service.port }}"
        resources:
          requests:
            cpu: {{ .Values.apiGateway.resources.requests.cpu }}
            memory: {{ .Values.apiGateway.resources.requests.memory }}
          limits:
            cpu: {{ .Values.apiGateway.resources.limits.cpu }}
            memory: {{ .Values.apiGateway.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.apiGateway.port }}
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.apiGateway.port }}
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: api-gateway
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
  - port: {{ .Values.apiGateway.service.port }}
    targetPort: {{ .Values.apiGateway.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    app: api-gateway

{{- if .Values.apiGateway.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: {{ .Values.apiGateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.apiGateway.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.apiGateway.autoscaling.targetCPUUtilization }}
{{- end }}

{{- if .Values.apiGateway.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    {{- toYaml .Values.apiGateway.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.apiGateway.ingress.className }}
  ingressClassName: {{ .Values.apiGateway.ingress.className }}
  {{- end }}
  rules:
  {{- range .Values.apiGateway.ingress.hosts }}
  - host: {{ .host | quote }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: {{ .pathType }}
        backend:
          service:
            name: api-gateway
            port:
              number: {{ $.Values.apiGateway.service.port }}
      {{- end }}
  {{- end }}
{{- end }}

{{- end }}
