---
# Kustomize Dev Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: microservices-dev

namePrefix: dev-

replicas:
  - name: api-gateway
    count: 2
  - name: user-service
    count: 2
  - name: product-service
    count: 2
  - name: order-service
    count: 2

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
  - target:
      kind: Deployment
      name: mysql
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

commonLabels:
  environment: dev
  managed-by: kustomize

commonAnnotations:
  description: "Development environment for microservices"
