---
# Kustomize Prod Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: microservices-prod

namePrefix: prod-

replicas:
  - name: api-gateway
    count: 3
  - name: user-service
    count: 3
  - name: product-service
    count: 3
  - name: order-service
    count: 3

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
  - target:
      kind: Deployment
      name: mysql
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: replace
        path: /spec/replicas
        value: 1

commonLabels:
  environment: prod
  managed-by: kustomize

commonAnnotations:
  description: "Production environment for microservices"
